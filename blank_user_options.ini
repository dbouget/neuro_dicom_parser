[Case]
input_folder=  # Full path to the folder to process
output_folder=  # Full path to the base directory where results will be stored
content_granularity=  # Granularity of the content inside the input folder, from [cohort, patient, timepoint, image] 

[DICOM]
override_existing=  # Boolean to override any previous conversion in the destination folder
structure=  # Structure of the DICOM folder, [sectra_cdmedia, manual]
conversion_method=  # dcm2niix
fully_anonymised=  # Boolean to indicate if the DICOM export performed complete anonymisation (include DICOM Instance/Series UID tags)

[Identification]
domain=  # Domain of the DICOM content, [neuro, mediastinum]
perform=  # Boolean to indicate whether sequence identification and best sequences selection should be performed
override_classification= # Boolean to 
override_selection=  # Boolean to 